  <div class="mreg-wrapper">
    <div class="mreg-card">

      <h2 class="mreg-title">User Feedback</h2>

      <form class="mreg-form" method="post">

        <div class="mreg-group">
          <label class="mreg-label">Full Name *</label>

          <input type="text" class="mreg-input" name="name" value="Enter Name" required>

        </div>

        <div class="mreg-group">
          <label class="mreg-label">Email Address *</label>

          <input type="email" class="mreg-input" name="email" value="Enter Email" required>

        </div>

        <div class="mreg-group">
          <label class="mreg-label">Feedback Type *</label>
          <select class="mreg-select" name="feedback" required>
            <option value="">----------</option>
            <option value="Suggestion">Suggestion</option>
            <option value="Bug Report">Bug Report</option>
            <option value="Complaint">Complaint</option>
            <option value="Appreciation">Appreciation</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="mreg-group">
          <label class="mreg-label">Your Feedback *</label>
          <textarea class="mreg-input" rows="4" name="message" required></textarea>
        </div>

        <button type="submit" class="mreg-submit">
          SUBMIT FEEDBACK
        </button>

      </form>

    </div>
  </div>
